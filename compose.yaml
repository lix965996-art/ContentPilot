name: contentpilot

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: contentpilot
      MYSQL_USER: contentpilot
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Copy .env.example to .env and set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Copy .env.example to .env and set MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ContentPilot
      APP_ENV: production
      APP_TIMEZONE: Asia/Shanghai
      DATABASE_URL: mysql+pymysql://contentpilot:${MYSQL_PASSWORD}@db:3306/contentpilot?charset=utf8mb4
      SQLITE_FALLBACK_URL: sqlite:////app/data/contentpilot.db
      JWT_SECRET: ${JWT_SECRET:?Copy .env.example to .env and set JWT_SECRET}
      PLATFORM_CREDENTIAL_KEY: ${PLATFORM_CREDENTIAL_KEY:?Copy .env.example to .env and set PLATFORM_CREDENTIAL_KEY}
      CORS_ORIGINS: http://localhost:${CONTENTPILOT_PORT:-8080},http://127.0.0.1:${CONTENTPILOT_PORT:-8080}
      APP_DEMO_MODE: ${APP_DEMO_MODE:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      MEDIA_FALLBACK_ENABLED: ${MEDIA_FALLBACK_ENABLED:-true}
      PUBLISH_MODE: ${PUBLISH_MODE:-manual}
      WEIBO_API_BASE_URL: https://api.weibo.com
      WECHAT_API_BASE_URL: https://api.weixin.qq.com
    volumes:
      - uploads:/app/uploads
    ports:
      - "${CONTENTPILOT_API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${CONTENTPILOT_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  mysql_data:
  uploads:
